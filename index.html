<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Imóveis disponíveis</title>
<style>
  :root {
    --accent: rgb(26, 180, 179);
    --accent-bg: rgba(26, 180, 179, 0.15);
    --bg: #000000;
    --card-bg: #111111;
    --card-border: rgba(255, 255, 255, 0.12);
    --text: #ffffff;
    --text-muted: rgba(255, 255, 255, 0.55);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }

  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 20px;
    border-bottom: 0.5px solid rgba(255, 255, 255, 0.15);
    margin-bottom: 24px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 600;
  }

  .brand-mark {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--accent-bg);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  #contador {
    font-size: 13px;
    color: var(--text-muted);
  }

  .filtros {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  select {
    background: var(--card-bg);
    color: var(--text);
    border: 0.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }

  .card:hover {
    border-color: var(--accent);
  }

  .card-foto {
    height: 140px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.25);
    font-size: 13px;
    background-size: cover;
    background-position: center;
  }

  .card-body { padding: 12px 14px; }

  .tag {
    display: inline-block;
    background: var(--accent-bg);
    color: var(--accent);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    margin-bottom: 8px;
  }

  .card-titulo {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 4px;
  }

  .card-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin: 0 0 8px;
  }

  .card-valor {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    margin: 0 0 10px;
  }

  .tag-status {
    display: inline-block;
    background: rgba(255, 255, 255, 0.08);
    color: var(--text-muted);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    margin-bottom: 8px;
    margin-left: 6px;
  }

  .card-descricao {
    font-size: 12px;
    color: var(--text-muted);
    margin: 0 0 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-data {
    font-size: 11px;
    color: var(--text-muted);
    margin: 0 0 10px;
  }

  .btn-whatsapp {
    display: block;
    text-align: center;
    background: var(--accent);
    color: #000;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    padding: 9px 0;
    border-radius: 8px;
  }

  .btn-whatsapp:hover {
    opacity: 0.9;
  }

  .vazio {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 0;
    font-size: 14px;
  }

  /* Modal de detalhes */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
    z-index: 100;
  }

  .modal-overlay.aberto { display: flex; }

  .modal {
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 12px;
    max-width: 560px;
    width: 100%;
    padding: 20px;
  }

  .modal-fechar {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    float: right;
    cursor: pointer;
    line-height: 1;
  }

  .modal-fotos {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin: 12px 0 16px;
  }

  .modal-fotos img {
    height: 160px;
    border-radius: 8px;
    flex-shrink: 0;
  }

  .modal-linha {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 8px 0;
    border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
  }

  .modal-linha span:first-child { color: var(--text-muted); }

  .modal-descricao {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    margin: 14px 0;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="brand">
      <div class="brand-mark">i</div>
      <span>Sua logo aqui</span>
    </div>
    <span id="contador">carregando...</span>
  </header>

  <div class="filtros">
    <select id="filtroCidade"><option value="">Cidade: todas</option></select>
    <select id="filtroTipo"><option value="">Tipo: todos</option></select>
  </div>

  <div id="grid" class="grid"></div>
  <div id="vazio" class="vazio" style="display:none;">Nenhum imóvel encontrado com esses filtros.</div>
</div>

<div id="modalOverlay" class="modal-overlay">
  <div class="modal">
    <button class="modal-fechar" id="modalFechar">×</button>
    <div id="modalConteudo"></div>
  </div>
</div>

<script>
  let imoveis = [];

  function formatarValor(valor) {
    if (valor == null) return "Sob consulta";
    return valor.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  }

  function formatarData(dataIso) {
    if (!dataIso) return "";
    const [ano, mes, dia] = dataIso.split("-");
    return `${dia}/${mes}/${ano}`;
  }

  const WHATSAPP_NUMERO = "5567984849772";

  function linkWhatsapp(im) {
    const texto = `Olá! Tenho interesse no imóvel em ${im.localizacao || "um dos seus anúncios"}${im.cidade ? " - " + im.cidade : ""}.`;
    return `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(texto)}`;
  }

  function render(lista) {
    const grid = document.getElementById("grid");
    const vazio = document.getElementById("vazio");
    grid.innerHTML = "";

    if (lista.length === 0) {
      vazio.style.display = "block";
      return;
    }
    vazio.style.display = "none";

    lista.forEach((im) => {
      const card = document.createElement("div");
      card.className = "card";
      const foto = im.fotos && im.fotos[0];
      card.innerHTML = `
        <div class="card-foto" style="${foto ? `background-image:url('${foto}')` : ""}">${foto ? "" : "sem foto"}</div>
        <div class="card-body">
          <span class="tag">${im.tipo || "Não informado"}</span><span class="tag-status">${im.status || ""}</span>
          <p class="card-titulo">${im.localizacao || "Localização não informada"}</p>
          <p class="card-sub">${im.cidade || ""}${im.area ? " · " + im.area + " m²" : ""}</p>
          ${im.descricao ? `<p class="card-descricao">${im.descricao}</p>` : ""}
          <p class="card-valor">${formatarValor(im.valor)}</p>
          ${im.dataAnuncio ? `<p class="card-data">Anunciado em ${formatarData(im.dataAnuncio)}</p>` : ""}
          <a href="${linkWhatsapp(im)}" target="_blank" rel="noopener" class="btn-whatsapp" data-stop="1">Mais informações</a>
        </div>
      `;
      card.addEventListener("click", (e) => {
        if (e.target.closest("[data-stop]")) return;
        abrirModal(im);
      });
      grid.appendChild(card);
    });
  }

  function abrirModal(im) {
    const conteudo = document.getElementById("modalConteudo");
    const fotosHtml = (im.fotos || [])
      .map((f) => `<img src="${f}" alt="Foto do imóvel" />`)
      .join("");

    conteudo.innerHTML = `
      <span class="tag">${im.tipo || "Não informado"}</span><span class="tag-status">${im.status || ""}</span>
      <h2 style="margin:8px 0 4px; font-size:18px;">${im.localizacao || "Localização não informada"}</h2>
      <p style="margin:0; color:var(--text-muted); font-size:13px;">${im.cidade || ""}</p>
      ${fotosHtml ? `<div class="modal-fotos">${fotosHtml}</div>` : ""}
      ${im.descricao ? `<p class="modal-descricao">${im.descricao}</p>` : ""}
      <div class="modal-linha"><span>Valor</span><span>${formatarValor(im.valor)}</span></div>
      ${im.area ? `<div class="modal-linha"><span>Área</span><span>${im.area} m²</span></div>` : ""}
      ${im.documentado ? `<div class="modal-linha"><span>Documentação</span><span>${im.documentado}</span></div>` : ""}
      ${im.negociacao && im.negociacao.length ? `<div class="modal-linha"><span>Negociação</span><span>${im.negociacao.join(", ")}</span></div>` : ""}
      ${im.contrato ? `<div class="modal-linha"><span>Contrato/ID</span><span>${im.contrato}</span></div>` : ""}
      ${im.dataAnuncio ? `<div class="modal-linha"><span>Anunciado em</span><span>${formatarData(im.dataAnuncio)}</span></div>` : ""}
      <a href="${linkWhatsapp(im)}" target="_blank" rel="noopener" class="btn-whatsapp" style="margin-top:16px;">Mais informações no WhatsApp</a>
    `;
    document.getElementById("modalOverlay").classList.add("aberto");
  }

  document.getElementById("modalFechar").addEventListener("click", () => {
    document.getElementById("modalOverlay").classList.remove("aberto");
  });
  document.getElementById("modalOverlay").addEventListener("click", (e) => {
    if (e.target.id === "modalOverlay") e.target.classList.remove("aberto");
  });

  function popularFiltros(lista) {
    const cidades = [...new Set(lista.map((i) => i.cidade).filter(Boolean))].sort();
    const tipos = [...new Set(lista.map((i) => i.tipo).filter(Boolean))].sort();

    const selCidade = document.getElementById("filtroCidade");
    cidades.forEach((c) => {
      const opt = document.createElement("option");
      opt.value = c;
      opt.textContent = c;
      selCidade.appendChild(opt);
    });

    const selTipo = document.getElementById("filtroTipo");
    tipos.forEach((t) => {
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = t;
      selTipo.appendChild(opt);
    });
  }

  function aplicarFiltros() {
    const cidade = document.getElementById("filtroCidade").value;
    const tipo = document.getElementById("filtroTipo").value;
    const filtrado = imoveis.filter(
      (i) => (!cidade || i.cidade === cidade) && (!tipo || i.tipo === tipo)
    );
    render(filtrado);
  }

  document.getElementById("filtroCidade").addEventListener("change", aplicarFiltros);
  document.getElementById("filtroTipo").addEventListener("change", aplicarFiltros);

  async function carregar() {
    try {
      const resp = await fetch("/.netlify/functions/imoveis");
      const data = await resp.json();

      if (!resp.ok) {
        document.getElementById("contador").textContent = "erro ao carregar";
        console.error(data);
        return;
      }

      imoveis = data;
      document.getElementById("contador").textContent =
        imoveis.length + (imoveis.length === 1 ? " imóvel disponível" : " imóveis disponíveis");
      popularFiltros(imoveis);
      render(imoveis);
    } catch (err) {
      document.getElementById("contador").textContent = "erro ao carregar";
      console.error(err);
    }
  }

  carregar();
</script>

</body>
</html>
